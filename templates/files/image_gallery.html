{% extends 'base.html' %}

{% load static %}

  {% block title%}TCRC|Image Gallery{% endblock title%}

{% block content %}
<br>
<style>
  #selectBox{
   border-radius: 25px;
   display: inline-block;
   overflow: hidden;
   background: hsl(0, 0%, 95%);
   height: 37px;
   width: 400px;
 }
</style>
<section class="contact-us" id="contact">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 align-self-center">
            <form class="row g-4" id="contact" action="" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div style="text-align: center; color: green;">{{ msg }}</div>
                <h5>Upload Images</h5>
                <div class="col-md-12">
                    <label for="" class="form-label">Select Image(s)</label>
                    <input style="color: blue;" type="file" multiple name="images">
                </div>
                <div class="col-md-12">
                  <label for="" class="form-label">Image Collection</label>
                  <select name="collection" id="" class="form-control">
                    {% for collection in collections %}
                      <option value="{{collection.id}}" {% if collection.title == "General" %}selected{% endif %}>
                        {{collection.title}} 
                      </option>
                    {% endfor %}
                  </select>
                </div>
                <button class="btn btn-primary">Upload Image(s)</button>
            </form>  
        </div>
      </div>
    </div>
    {% include 'base_files/footer.html' %}
  </section>

{%endblock%}
