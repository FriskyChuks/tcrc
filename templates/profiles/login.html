{% extends 'base.html' %}

{% load static %}

  {% block title%}TCRC|Login{% endblock title%}

{% block content %}

  <section class="contact-us" id="contact">
    <div class="container">
      <div class="row"><br>
        <div class="col-lg-12 align-self-center">
          <div class="row g-3">
            <div class="col-lg-3"></div>
            <div class="col-lg-6">
              <form id="contact" action="" method="POST">{% csrf_token %}
                <div style="text-align: center; color: red;">{{ msg }}</div>
                <div class="row">
                  <div class="col-lg-12">
                    <h2>Login</h2>
                  </div>
                  <div class="col-lg-12">
                    <fieldset>
                      <input name="username" type="text" id="username" placeholder="EMAIL...*" required="">
                    </fieldset>
                  </div>
                  <div class="col-lg-12">
                    <fieldset>
                      <input name="password" type="password" id="password" placeholder="PASSWORD...*" required="">
                    </fieldset>
                  </div>
                  <div class="col-lg-12">
                    <fieldset>
                      <button type="submit" id="form-submit" class="btn btn-primary">Login</button>
                    </fieldset>
                  </div>
                   <span style="text-align: center;">
                    Not a member yet? Please <a href="{% url 'membership' %}">Register</a> with us
                   </span>
                </div>
              </form>
            </div>
            <div class="col-lg-3"></div>
          </div>
        </div>
      </div>
    </div>
    {% include 'base_files/footer.html' %}
  </section>

{%endblock%}
